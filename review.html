<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Review | XYZSOlve</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="Style/review.css">
</head>

<body>

  <section class="review">

    <h1>Review Your Order</h1>
    <p class="subtitle">Choose your package and customize your service</p>

    <div class="layout">
      <div class="left">

        <div class="card">
          <h3>Selected Service</h3>
          <p class="service" id="displayService">Web Development</p>
          <p class="desc" id="displayDesc">Modern, responsive website tailored to your business</p>
        </div>

        <div class="card">
          <h3>Select Package</h3>

          <label class="pkg">
            <input type="radio" name="pkg" value="Basic" data-price="9999" checked>
            <div class="pkg-header">
              <span>Basic</span>
              <strong>₹9,999</strong>
            </div>

            <div class="pkg-details">
              <ul>
                <li>Up to 3 pages</li>
                <li>Responsive design</li>
                <li>Basic SEO</li>
                <li>Delivery: 7 days</li>
              </ul>
            </div>
          </label>

          <label class="pkg">
            <input type="radio" name="pkg" value="Standard" data-price="24999">
            <div class="pkg-header">
              <span>Standard <span class="recommended-badge">Recommended</span></span>
              <strong>₹24,999</strong>
            </div>

            <div class="pkg-details">
              <ul>
                <li>Up to 7 pages</li>
                <li>Modern UI design</li>
                <li>Advanced SEO</li>
                <li>Delivery: 10–12 days</li>
              </ul>
            </div>
          </label>

          <label class="pkg">
            <input type="radio" name="pkg" value="Premium" data-price="49999">
            <div class="pkg-header">
              <span>Premium</span>
              <strong>₹49,999</strong>
            </div>

            <div class="pkg-details">
              <ul>
                <li>Unlimited pages</li>
                <li>Custom design</li>
                <li>Full SEO</li>
                <li>Performance optimization</li>
                <li>Delivery: 15 days</li>
              </ul>
            </div>
          </label>

        </div>

        <div class="card">
          <h3>Add-ons</h3>

          <label class="addon">
            <input type="checkbox" value="Fast Delivery" data-price="3000">
            Extra Fast Delivery — ₹3,000
          </label>

          <label class="addon">
            <input type="checkbox" value="Additional Revisions" data-price="1500">
            Additional Revisions — ₹1,500
          </label>

          <label class="addon">
            <input type="checkbox" value="Maintenance" data-price="2000">
            Maintenance — ₹2,000
          </label>

        </div>

      </div>

      <div class="right">

        <div class="summary">

          <h3>Summary</h3>

          <div class="row">
            <span>Service</span>
            <span id="summaryService">Web Dev</span>
          </div>

          <div class="row">
            <span>Package</span>
            <span id="summaryPackagePrice">₹9,999</span>
          </div>

          <div class="row">
            <span>Add-ons</span>
            <span id="summaryAddonsPrice">₹0</span>
          </div>

          <div class="row total">
            <span>Total</span>
            <span id="summaryTotalPrice">₹9,999</span>
          </div>

          <div class="actions">

            <a href="service.html" class="edit-btn">
              ← Edit Request
            </a>

            <a href="#" id="proceedToCheckoutBtn" class="checkout-btn">
              Proceed to Checkout
            </a>

          </div>

        </div>

      </div>

    </div>

  </section>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof initReviewPage === 'function') initReviewPage();
    });
  </script>
</body>

</html>
