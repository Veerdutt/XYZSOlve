<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | XYZSOlve</title>

<link rel="stylesheet" href="Style/signin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>

<div class="auth-container" id="auth-container">

<div class="form-container auth-sign-up">
<form>

<h1>Create Account</h1>

<div class="social-icons">
<a href="#"><i class="fa-brands fa-google"></i></a>
<a href="#"><i class="fa-brands fa-facebook-f"></i></a>
<a href="#"><i class="fa-brands fa-github"></i></a>
<a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
</div>

<span>or use your email for registration</span>

<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Sign Up</button>

</form>
</div>


<div class="form-container auth-sign-in">
<form>

<h1>Sign In</h1>

<div class="social-icons">
<a href="#"><i class="fa-brands fa-google"></i></a>
<a href="#"><i class="fa-brands fa-facebook-f"></i></a>
<a href="#"><i class="fa-brands fa-github"></i></a>
<a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
</div>

<span>or use your email password</span>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<a href="#">Forgot your password?</a>

<button>Sign In</button>

</form>
</div>


<div class="auth-toggle-container">
<div class="auth-toggle">

<div class="auth-toggle-panel auth-toggle-left">
<h1>Welcome Back!</h1>
<p>Enter your personal details to use all features</p>
<button class="hidden" id="login">Sign In</button>
</div>

<div class="auth-toggle-panel auth-toggle-right">
<h1>Hello, Friend!</h1>
<p>Register with your personal details to use all features</p>
<button class="hidden" id="register">Sign Up</button>
</div>

</div>
</div>

</div>

<script>

const container = document.getElementById('auth-container');
const registerBtn = document.getElementById('register');
const loginBtn = document.getElementById('login');

registerBtn.addEventListener('click', () => {
container.classList.add("active");
});

loginBtn.addEventListener('click', () => {
container.classList.remove("active");
});

</script>

</body>
</html>
