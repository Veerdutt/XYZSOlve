<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | XYZSOlve</title>
  <link rel="stylesheet" href="Style/index.css">
  <link rel="stylesheet" href="Style/signin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- ===== SIGN IN WRAPPER ===== -->
  <section class="auth-wrapper">

    <div class="auth-left">
      <h1>Welcome Back</h1>
      <p>
        Sign in to access your dashboard, manage projects,
        and continue building with XYZSOlve.
      </p>

      <ul>
        <li><i class="fas fa-check"></i> Professional Web Solutions</li>
        <li><i class="fas fa-check"></i> Secure User Access</li>
        <li><i class="fas fa-check"></i> Modern UI Experience</li>
      </ul>

      <a href="index.html" class="back-home">
        ← Back to Home
      </a>
    </div>

    <div class="auth-right">
      <div class="auth-card">

        <h2>Sign In</h2>
        <p class="subtitle">Please enter your credentials</p>

        <form action="dashboard.html">
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group password-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
          </div>

          <div class="form-options">
            <label>
              <input type="checkbox"> Remember me
            </label>
            <a href="forgot-password.html">Forgot password?</a>
          </div>

          <button type="submit" class="auth-btn">
            Sign In
          </button>

          <p class="switch-text">
            Don’t have an account?
            <a href="signup.html">Create one</a>
          </p>
        </form>

      </div>
    </div>

  </section>
