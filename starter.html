<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Welcome | XYZSOlve</title>

    <link rel="stylesheet" href="starter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }


        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }


        .starter-content {
            max-width: 650px;
            padding: 40px;
            animation: fadeIn 1.5s ease;
        }

        .logo {
            width: 90px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 span {
            color: #818cf8;
        }

        p {
            font-size: 16px;
            margin-bottom: 35px;
            opacity: 0.9;
        }


        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .primary {
            background: #6366f1;
            color: white;
        }

        .primary:hover {
            background: #4f46e5;
            transform: translateY(-3px);
        }

        .secondary {
            border: 2px solid white;
            color: white;
        }

        .secondary:hover {
            background: white;
            color: #111;
        }


        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }


        @media(max-width:768px) {

            h1 {
                font-size: 34px;
            }

            .logo {
                width: 70px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }

        }
    </style>
</head>

<body>



    <video autoplay muted loop class="bg-video">
        <source src="videos\hero-bg.webm" type="video/mp4">
    </video>


    <div class="overlay"></div>


    <div class="starter-content">

        <img src="images/logo.png" class="logo">

        <h1>Welcome to <span>XYZSOlve</span></h1>

        <p>
            Build modern websites, scalable applications, and digital solutions that grow your business.
        </p>

        <div class="buttons">

            <a href="index.html" class="btn primary">
                <i class="fas fa-rocket"></i> Get Started
            </a>

            <a href="signin.html" class="btn secondary">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </a>
        </div>
    </div>

</body>

</html>
